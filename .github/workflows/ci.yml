name: Test and build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Test tournament formats and cloud logic
        shell: bash
        run: |
          set -euo pipefail
          node tests/swiss.test.mjs
          node tests/api.test.mjs
          node tests/data-management.test.mjs
          node tests/navigation.test.mjs
          node tests/sync.test.mjs

      - name: Test all formats from 2 to 32 players
        shell: bash
        run: |
          set -euo pipefail
          if ! matrix_output="$(node tests/format-matrix.test.mjs 2>&1)"; then
            echo "$matrix_output"
            annotation="${matrix_output//$'\n'/' | '}"
            echo "::error title=Format matrix failed::$annotation"
            exit 1
          fi
          echo "$matrix_output"

      - name: Test browser tournament flows
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 8765 --bind 127.0.0.1 >/tmp/spin-league-test-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          sleep 1
          for test_page in tournament.test.html full-flow.test.html; do
            output="$(google-chrome --headless=new --no-sandbox --disable-gpu --virtual-time-budget=15000 --dump-dom "http://127.0.0.1:8765/tests/${test_page}")"
            echo "$output"
            echo "$output" | grep -q 'PASS '
          done

      - name: Build Sites artifact
        shell: pwsh
        run: ./build.ps1

      - name: Validate build structure
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/server/index.js
          test -f dist/client/index.html
          test -f dist/client/src/main.js
          test -f dist/.openai/hosting.json
          tar -cf spin-league-sites.tar dist

      - name: Save deployable artifact
        uses: actions/upload-artifact@v4
        with:
          name: spin-league-sites-${{ github.sha }}
          path: spin-league-sites.tar
          if-no-files-found: error
          retention-days: 14
