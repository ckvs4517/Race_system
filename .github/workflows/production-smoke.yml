# 每日及手動檢查正式網站的首頁、API 與關鍵比賽規則是否仍可使用。
name: Production smoke check

on:
  workflow_dispatch:
  schedule:
    - cron: '15 1 * * *'

permissions:
  contents: read

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify public site and API
        run: node scripts/verify-deployment.mjs https://spin-league-tournament.ckvs4517.chatgpt.site
